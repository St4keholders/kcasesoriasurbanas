<!-- ============================================================
     1. HEADER FIJO CON EFECTO GLASS AL HACER SCROLL
     ============================================================ -->
<style>
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 3rem;
    transition: background 0.4s ease, border-color 0.4s ease, backdrop-filter 0.4s ease, box-shadow 0.4s ease;
    border-bottom: 1px solid transparent;
  }
  .site-header.scrolled {
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom-color: var(--line);
    box-shadow: var(--shadow-sm);
  }
  .brand {
    font-family: var(--display);
    font-size: 1.05rem;
    color: var(--sky-deep);
    text-decoration: none;
  }
  .brand-sub {
    font-family: var(--mono);
    font-size: 0.52rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .nav { display: flex; align-items: center; gap: 2rem; }
  .nav a {
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-soft);
    text-decoration: none;
    transition: color 0.25s ease;
  }
  .nav a:hover { color: var(--sky-deep); }
  .nav .nav-cta {
    color: #fff;
    background: var(--sky);
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-weight: 500;
  }
  .nav .nav-cta:hover {
    background: var(--sky-deep);
    box-shadow: 0 4px 16px var(--sky-glow);
  }
</style>
<header class="site-header" id="siteHeader">
  <a class="brand" href="#top">Marca</a>
  <nav class="nav">
    <a href="#servicios">Servicios</a>
    <a href="#agenda">Agenda</a>
    <a class="nav-cta" href="#contacto">Contacto</a>
  </nav>
</header>
<script>
  const header = document.getElementById('siteHeader');
  const onScroll = () => header.classList.toggle('scrolled', window.scrollY > 40);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
</script>

<!-- ============================================================
     8. AMBIENT — NUBES FLOTANTES DE FONDO
     ============================================================ -->
<style>
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91,163,217,0.08), transparent 70%);
    animation: cloudDrift linear infinite;
  }
  @keyframes cloudDrift {
    0%   { transform: translateX(0) translateY(0); }
    25%  { transform: translateX(30px) translateY(-15px); }
    50%  { transform: translateX(0) translateY(-25px); }
    75%  { transform: translateX(-30px) translateY(-15px); }
    100% { transform: translateX(0) translateY(0); }
  }
  .dot-pattern {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
    background-image: radial-gradient(circle, rgba(91,163,217,0.15) 1px, transparent 1px);
    background-size: 32px 32px;
  }
</style>
<div class="ambient" id="ambient"></div>
<div class="dot-pattern"></div>
<script>
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reducedMotion) {
    const ambient = document.getElementById('ambient');
    for (let i = 0; i < 6; i++) {
      const c = document.createElement('div');
      c.className = 'cloud';
      const size = 200 + Math.random() * 400;
      c.style.width = c.style.height = size + 'px';
      c.style.left = (Math.random() * 100) + '%';
      c.style.top = (Math.random() * 100) + '%';
      c.style.animationDuration = (40 + Math.random() * 40) + 's';
      c.style.animationDelay = (Math.random() * -40) + 's';
      ambient.appendChild(c);
    }
  }
</script>


<!-- ============================================================
     9. REVEAL ON SCROLL (JS — usa la clase .reveal de tokens.css)
     ============================================================ -->
<script>
  const reducedMotion2 = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const revealEls = document.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window && !reducedMotion2) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -6% 0px' });
    revealEls.forEach(el => io.observe(el));
  } else {
    revealEls.forEach(el => el.classList.add('in'));
  }
</script>
